name: Bug report
description: Report unexpected SDK behavior
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: A short code snippet we can run. **Do not include your API key.**
      render: python
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Full traceback / error
      render: shell

  - type: input
    id: version
    attributes:
      label: cryptovol version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true
